<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">CNN bird species recognition workflow</title>
  <desc id="desc">A transparent portfolio illustration showing a bird image, CNN layers, ResNet-50 model evaluation, and classification scores.</desc>
  <defs>
    <linearGradient id="barGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#23689b"/>
      <stop offset="1" stop-color="#1f746e"/>
    </linearGradient>
    <linearGradient id="warmGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#b8733d"/>
      <stop offset="1" stop-color="#9a3d57"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#123145" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#143d5a" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <g opacity="0.7">
    <rect x="36" y="82" width="884" height="414" rx="34" fill="url(#grid)"/>
  </g>

  <g transform="translate(0 30)" filter="url(#softShadow)">
    <rect x="72" y="96" width="228" height="272" rx="28" fill="#fffef9" stroke="#c9dce6" stroke-width="2"/>
    <rect x="95" y="120" width="182" height="172" rx="22" fill="#f2f6f4" stroke="#d6e4e9"/>
    <path d="M135 228c18-57 55-84 105-78-17 16-18 36-3 59 12 19 9 38-6 55-18-30-47-47-96-36Z" fill="url(#warmGradient)" opacity="0.92"/>
    <path d="M148 224c38-22 71-21 103 4-10 19-29 30-57 33-31 3-51-5-66-22 6-5 13-10 20-15Z" fill="#1f746e" opacity="0.82"/>
    <circle cx="230" cy="166" r="5" fill="#143d5a"/>
    <path d="M239 167l24-6-18 18Z" fill="#b8733d"/>
    <path d="M126 279c34 18 76 20 126 5" fill="none" stroke="#143d5a" stroke-width="4" stroke-linecap="round" opacity="0.36"/>
    <text x="98" y="330" fill="#143d5a" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">CUB200-2011</text>
  </g>

  <g transform="translate(0 30)" fill="none" stroke="#1f746e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M318 234h65"/>
    <path d="M366 216l18 18-18 18"/>
    <path d="M615 234h65"/>
    <path d="M663 216l18 18-18 18"/>
  </g>

  <g transform="translate(0 30)" filter="url(#softShadow)">
    <rect x="392" y="108" width="54" height="246" rx="12" fill="#dbe8ed" stroke="#bcd2dc"/>
    <rect x="462" y="88" width="54" height="286" rx="12" fill="#c9dfe6" stroke="#b4ced8"/>
    <rect x="532" y="124" width="54" height="214" rx="12" fill="#e5efe9" stroke="#cbdcd2"/>
    <path d="M406 146h28M406 184h28M406 222h28M406 260h28M406 298h28" stroke="#23689b" stroke-width="4" stroke-linecap="round"/>
    <path d="M476 126h28M476 166h28M476 206h28M476 246h28M476 286h28M476 326h28" stroke="#1f746e" stroke-width="4" stroke-linecap="round"/>
    <path d="M546 162h28M546 204h28M546 246h28M546 288h28" stroke="#b8733d" stroke-width="4" stroke-linecap="round"/>
    <rect x="342" y="388" width="296" height="54" rx="27" fill="#fffef9" stroke="#c9dce6"/>
    <text x="490" y="422" text-anchor="middle" fill="#143d5a" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">CNN feature extraction</text>
  </g>

  <g transform="translate(0 30)" filter="url(#softShadow)">
    <rect x="692" y="96" width="236" height="346" rx="30" fill="#fffef9" stroke="#c9dce6" stroke-width="2"/>
    <text x="728" y="150" fill="#143d5a" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">ResNet-50</text>
    <text x="728" y="181" fill="#667886" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">optimised model</text>
    <rect x="728" y="222" width="158" height="18" rx="9" fill="#dce7ea"/>
    <rect x="728" y="222" width="148" height="18" rx="9" fill="url(#barGradient)"/>
    <text x="728" y="267" fill="#143d5a" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="900">93.55%</text>
    <text x="728" y="294" fill="#667886" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">validation accuracy</text>
    <rect x="728" y="326" width="158" height="18" rx="9" fill="#dce7ea"/>
    <rect x="728" y="326" width="155" height="18" rx="9" fill="url(#warmGradient)"/>
    <text x="728" y="374" fill="#143d5a" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="900">~98%</text>
    <text x="728" y="401" fill="#667886" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">training accuracy</text>
  </g>

</svg>
