<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-label="North Sea shipping emissions route map">
  <defs>
    <linearGradient id="seaGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fbf8" stop-opacity="0"/>
      <stop offset="0.58" stop-color="#dfeeea" stop-opacity=".58"/>
      <stop offset="1" stop-color="#eaf2ee" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="mainRoute" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f5f8f"/>
      <stop offset=".55" stop-color="#24706d"/>
      <stop offset="1" stop-color="#b56f3b"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#174160" flood-opacity=".16"/>
    </filter>
    <filter id="routeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#174160" flood-opacity=".2"/>
    </filter>
    <style>
      .sea-panel{fill:url(#seaGlow);}
      .grid{stroke:#1f5f8f;stroke-width:1;opacity:.07;}
      .land{fill:#fffdf8;stroke:#95acc5;stroke-width:4;stroke-linejoin:round;}
      .coast-soft{fill:none;stroke:#c7d8dc;stroke-width:16;stroke-linecap:round;opacity:.28;}
      .route{fill:none;stroke:url(#mainRoute);stroke-linecap:round;filter:url(#routeShadow);}
      .route.thin{stroke-width:5;opacity:.48;}
      .route.mid{stroke-width:8;opacity:.68;}
      .route.strong{stroke-width:12;opacity:.88;}
      .port{fill:#fff;stroke:#d4e0e5;stroke-width:2;filter:url(#softShadow);}
      .hub{fill:#133b59;}
      .label rect{fill:#fff;stroke:#d7e1e5;stroke-width:1.3;rx:17;filter:url(#softShadow);}
      .label text{font-family:Inter,Arial,sans-serif;fill:#143d58;font-size:14px;font-weight:800;}
      .small{font-size:11px;font-weight:750;fill:#6c7d89;}
      .country{font-family:Inter,Arial,sans-serif;font-size:12px;font-weight:850;fill:#1f5f8f;letter-spacing:.08em;}
    </style>
  </defs>
  <rect width="720" height="520" fill="transparent"/>
  <path class="sea-panel" d="M70 62h560c38 0 68 30 68 68v280c0 38-30 68-68 68H70c-38 0-68-30-68-68V130c0-38 30-68 68-68z"/>
  <g>
    <path class="grid" d="M84 80v400M164 80v400M244 80v400M324 80v400M404 80v400M484 80v400M564 80v400M644 80v400"/>
    <path class="grid" d="M42 112h646M42 192h646M42 272h646M42 352h646M42 432h646"/>
  </g>
  <g transform="translate(0 4)">
    <path class="coast-soft" d="M170 86c-40 44-66 86-64 136 2 54 34 83 24 122-8 31-52 59-51 94"/>
    <path class="land" d="M148 84c-34 37-60 74-62 125-2 50 27 78 20 118-8 43-56 62-48 100 8 35 59 30 93 4 44-33 45-87 39-128-6-46 20-70 14-111-5-38-28-75-56-108z"/>
    <path class="land" d="M206 128c23 24 31 52 24 83-4 20-21 32-17 56 5 30 35 40 32 72-2 27-28 45-54 43 12-48 2-86-4-120-7-42 10-78 19-134z"/>
    <path class="land" d="M514 74c-28 20-55 51-61 91-8 52 38 77 27 128-10 49-64 68-69 119 54-12 112-59 127-112 13-47-22-78-11-125 11-46 54-61 84-102-38-9-66-8-97 1z"/>
    <path class="land" d="M474 292c-56 11-89 36-118 71-19 22-42 34-77 40 51 36 140 18 184-39 23-30 40-50 77-64-22-9-47-12-66-8z"/>
    <path class="land" d="M403 196c-40 4-77 16-100 48-16 23-16 52-37 74 41 6 78-14 99-44 22-31 54-43 89-44-7-14-25-32-51-34z"/>
    <path class="land" d="M546 336c35 7 75 33 103 65-39 8-79 3-113-14-17-9-40-13-70-12 17-28 43-40 80-39z"/>
  </g>
  <g>
    <path class="route strong" d="M228 265C320 238 413 228 512 216"/>
    <path class="route mid" d="M220 282C316 291 394 307 480 335"/>
    <path class="route mid" d="M211 299C299 326 360 361 431 404"/>
    <path class="route mid" d="M238 247C335 203 421 177 530 148"/>
    <path class="route thin" d="M252 226C342 158 432 116 553 93"/>
    <path class="route thin" d="M232 311C298 357 339 392 394 430"/>
  </g>
  <g>
    <circle class="port" cx="219" cy="277" r="18"/>
    <circle class="hub" cx="219" cy="277" r="6"/>
    <text class="country" x="181" y="252">GBR</text>
    <circle class="port" cx="512" cy="216" r="15"/>
    <text class="country" x="528" y="220">NL</text>
    <circle class="port" cx="480" cy="335" r="14"/>
    <text class="country" x="496" y="339">BE</text>
    <circle class="port" cx="431" cy="404" r="14"/>
    <text class="country" x="447" y="409">FR</text>
    <circle class="port" cx="530" cy="148" r="14"/>
    <text class="country" x="546" y="152">DE</text>
    <circle class="port" cx="553" cy="93" r="14"/>
    <text class="country" x="569" y="97">NO</text>
    <circle class="port" cx="394" cy="430" r="12"/>
    <text class="country" x="410" y="434">DK</text>
  </g>
  <g class="label" transform="translate(80 104)">
    <rect width="252" height="58"/>
    <text x="20" y="24">North Sea shipping routes</text>
    <text class="small" x="20" y="43">FuelEU CO₂ route-pair visualisation prototype</text>
  </g>
  <g class="label" transform="translate(458 244)">
    <rect width="170" height="47"/>
    <text x="18" y="22">NL 4.45B kg CO₂</text>
    <text class="small" x="18" y="37">highest UK pair</text>
  </g>
  <g class="label" transform="translate(470 358)">
    <rect width="180" height="47"/>
    <text x="18" y="22">BE / FR / DE / NO</text>
    <text class="small" x="18" y="37">priority European links</text>
  </g>
</svg>
