<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="guestbook-api-base" content="" />
    <title>Guestbook Admin</title>
    <style>
      :root {
        --ink: #17212b;
        --muted: #697784;
        --line: #d9e1e4;
        --paper: #f7f5ef;
        --surface: #fffdf8;
        --blue: #163d5c;
        --copper: #b87945;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background:
          linear-gradient(rgba(23, 33, 43, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(23, 33, 43, 0.028) 1px, transparent 1px),
          var(--paper);
        background-size: 34px 34px;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 36px));
        margin: 0 auto;
        padding: 46px 0;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 28px;
      }

      .kicker {
        margin: 0 0 7px;
        color: #225f8f;
        font-size: 0.75rem;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", "Songti SC", serif;
        font-size: clamp(2.4rem, 7vw, 4.8rem);
        line-height: 0.98;
      }

      .panel,
      .message {
        border: 1px solid rgba(34, 95, 143, 0.14);
        border-radius: 18px;
        background: rgba(255, 253, 248, 0.78);
        box-shadow: 0 20px 60px rgba(23, 33, 43, 0.08);
      }

      .panel {
        display: grid;
        gap: 14px;
        max-width: 460px;
        padding: 22px;
      }

      input {
        width: 100%;
        min-height: 44px;
        border: 1px solid rgba(34, 95, 143, 0.16);
        border-radius: 12px;
        background: white;
        font: inherit;
        padding: 10px 12px;
      }

      button {
        border: 0;
        border-radius: 999px;
        background: var(--blue);
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 850;
        padding: 10px 16px;
      }

      button.secondary { background: #e8efec; color: var(--blue); }
      button.warn { background: #8f3d52; }

      .status {
        color: var(--muted);
        font-size: 0.88rem;
        font-weight: 720;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 28px 0 18px;
      }

      .toolbar button.is-active {
        background: var(--copper);
      }

      .list {
        display: grid;
        gap: 12px;
      }

      .message {
        display: grid;
        gap: 12px;
        padding: 18px;
      }

      .message-top {
        display: flex;
        justify-content: space-between;
        gap: 14px;
      }

      .message h3 {
        margin: 0;
        color: var(--blue);
      }

      .badge {
        align-self: start;
        border-radius: 999px;
        background: #e8efec;
        color: var(--blue);
        font-size: 0.75rem;
        font-weight: 900;
        padding: 4px 9px;
      }

      .message p {
        margin: 0;
        color: var(--ink);
        line-height: 1.6;
      }

      .meta {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="kicker">Guestbook Admin</p>
          <h1>留言审核后台</h1>
        </div>
        <a href="index.html">返回网站</a>
      </header>

      <section class="panel" id="loginPanel">
        <strong>Admin Login</strong>
        <input id="password" type="password" placeholder="默认密码：vivi-admin" />
        <button id="loginButton" type="button">进入后台</button>
        <p class="status" id="loginStatus"></p>
      </section>

      <section id="adminPanel" hidden>
        <div class="toolbar">
          <button class="is-active" type="button" data-filter="all">全部</button>
          <button type="button" data-filter="pending">待审核</button>
          <button type="button" data-filter="approved">已展示</button>
          <button type="button" data-filter="rejected">已拒绝</button>
          <button class="secondary" type="button" id="refreshButton">刷新</button>
        </div>
        <div class="list" id="messageList"></div>
      </section>
    </main>

    <script>
      const TOKEN_KEY = "portfolio-guestbook-admin-token";
      const configuredApiBase =
        window.GUESTBOOK_API_BASE ||
        document.querySelector('meta[name="guestbook-api-base"]')?.content?.trim() ||
        "";
      const API_BASE = configuredApiBase || (window.location.protocol === "file:" ? "http://127.0.0.1:8800" : "");
      let token = localStorage.getItem(TOKEN_KEY) || "";
      let filter = "all";
      let messages = [];

      const loginPanel = document.getElementById("loginPanel");
      const adminPanel = document.getElementById("adminPanel");
      const loginStatus = document.getElementById("loginStatus");
      const list = document.getElementById("messageList");

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[char]);
      }

      async function api(path, options = {}) {
        const response = await fetch(`${API_BASE}${path}`, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            "X-Admin-Token": token,
            ...(options.headers || {}),
          },
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Request failed");
        return data;
      }

      function render() {
        const visible = filter === "all" ? messages : messages.filter((item) => item.status === filter);
        if (!visible.length) {
          list.innerHTML = `<article class="message"><p class="meta">暂无留言。</p></article>`;
          return;
        }
        list.innerHTML = visible.map((item) => `
          <article class="message">
            <div class="message-top">
              <div>
                <h3>${escapeHtml(item.name)}</h3>
                <div class="meta">${escapeHtml(item.contact || "No contact")} · ${escapeHtml(item.created_at)}</div>
              </div>
              <span class="badge">${escapeHtml(item.status)}</span>
            </div>
            <p>${escapeHtml(item.message)}</p>
            <div class="actions">
              <button type="button" data-action="approved" data-id="${item.id}">Approve</button>
              <button class="secondary" type="button" data-action="pending" data-id="${item.id}">Pending</button>
              <button class="secondary" type="button" data-action="rejected" data-id="${item.id}">Reject</button>
              <button class="warn" type="button" data-action="delete" data-id="${item.id}">Delete</button>
            </div>
          </article>
        `).join("");
      }

      async function loadMessages() {
        const data = await api("/api/admin/messages");
        messages = data.messages || [];
        render();
      }

      document.getElementById("loginButton").addEventListener("click", async () => {
        token = document.getElementById("password").value.trim();
        try {
          await api("/api/admin/login", {
            method: "POST",
            body: JSON.stringify({ password: token }),
          });
          localStorage.setItem(TOKEN_KEY, token);
          loginPanel.hidden = true;
          adminPanel.hidden = false;
          await loadMessages();
        } catch (error) {
          loginStatus.textContent = error.message === "Failed to fetch" ? "请先运行 server.py 启动留言后端。" : "密码不正确。";
        }
      });

      document.querySelector(".toolbar").addEventListener("click", async (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        if (button.id === "refreshButton") {
          await loadMessages();
          return;
        }
        if (button.dataset.filter) {
          filter = button.dataset.filter;
          document.querySelectorAll("[data-filter]").forEach((node) => node.classList.toggle("is-active", node === button));
          render();
        }
      });

      list.addEventListener("click", async (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const id = button.dataset.id;
        if (button.dataset.action === "delete") {
          if (!confirm("确定删除这条留言吗？")) return;
          await api(`/api/admin/messages/${id}`, { method: "DELETE" });
        } else {
          await api(`/api/admin/messages/${id}`, {
            method: "PATCH",
            body: JSON.stringify({ status: button.dataset.action }),
          });
        }
        await loadMessages();
      });

      if (token) {
        loginPanel.hidden = true;
        adminPanel.hidden = false;
        loadMessages().catch(() => {
          localStorage.removeItem(TOKEN_KEY);
          loginPanel.hidden = false;
          adminPanel.hidden = true;
        });
      }
    </script>
  </body>
</html>
